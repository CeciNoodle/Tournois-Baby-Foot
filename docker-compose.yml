services:
  db:
    build:
      context: .
      dockerfile: docker/Dockerfile.db
      args:
        ENVIRONMENT: prod
    env_file:
      - ./Backend/.env
    environment:
      MYSQL_DATABASE: babyfoot_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend                 
    env_file:
      - ./Backend/.env
    environment:
      DB_HOST: db
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
