services:
  db:
    build:
      context: .
      dockerfile: docker/Dockerfile.db
    env_file:
      - ./Backend/.env
    environment:
      MYSQL_DATABASE: babyfoot_db
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend.dev
    env_file:
      - ./Backend/.env
    environment:
      DB_HOST: db
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./Backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
